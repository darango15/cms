# =============================================================================
# Configuración nginx para PAMEL CMS — Plesk (nginx puro, sin Apache)
# PHP 8.4 · Colocar en: Plesk → pamel.edu.pa → Apache & nginx Settings
#                        → "Additional nginx directives" (HTTP y HTTPS)
# =============================================================================

# ── Ocultar versión del servidor ───────────────────────────────────────────
server_tokens off;

# ── Security headers ───────────────────────────────────────────────────────
add_header X-Content-Type-Options   "nosniff"                              always;
add_header X-Frame-Options          "SAMEORIGIN"                           always;
add_header X-XSS-Protection         "1; mode=block"                        always;
add_header Referrer-Policy          "strict-origin-when-cross-origin"      always;
add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ── Bloquear bots maliciosos ───────────────────────────────────────────────
if ($http_user_agent ~* "(libwww-perl|wget|python|nikto|curl|scan|winhttp|clshttp|loader)") {
    return 403;
}

# ── Bloquear patrones maliciosos en query string ───────────────────────────
if ($query_string ~* "(\.\./|base64_encode|eval\(|GLOBALS|_REQUEST|<script|<iframe|javascript:)") {
    return 403;
}
if ($query_string ~* "(%00|%0d%0a)") {
    return 403;
}

# ── Bloquear acceso directo a cualquier .php excepto index.php ─────────────
location ~ ^/(?!index\.php$).+\.php$ {
    return 403;
}

# ── Imágenes de uploads faltantes → placeholder ────────────────────────────
location ~* ^/uploads/.*\.(jpg|jpeg|png|gif|webp)$ {
    try_files $uri /assets/images/logo.png;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# ── Cache de imágenes y fuentes (1 año) ────────────────────────────────────
location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
}

# ── Cache de CSS y JS (30 días) ────────────────────────────────────────────
location ~* \.(css|js)$ {
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
    try_files $uri =404;
}

# ── Denegar acceso a archivos sensibles ────────────────────────────────────
location ~* \.(env|git|log|sql|json|lock|md|yml|yaml|sh|bak)$ {
    return 404;
}

location ~ /\.(ht|git|env) {
    return 404;
}
