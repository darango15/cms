# Nginx Configuration for CMS
# Save this as: /etc/nginx/sites-available/pamel_edu_pa

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    
    root /var/www/html/pamel_edu_pa;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/pamel_edu_pa_access.log;
    error_log /var/log/nginx/pamel_edu_pa_error.log;

    # Main location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Admin routes
    location /admin {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;  # Adjust PHP version if needed
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny access to sensitive files
    location ~* \.(sql|log|txt)$ {
        deny all;
    }

    # Cache static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

